<body style=background-color:#707070>
  <h2>Combined Gears Calculator (for BABFT)</h2>

      <option value="internal">internal</option>

  </label>

  <br id="basic6" style="display:none;">
  <label id="thickness-label" style="display:none;">Outside thickness (studs): <input id="thickness" type="number" step="any" value="1"></label>
  <br id="basic7" style="display:none;">

  <label id="planet1" style="display:none;">Sun gear teeth: <input id="s" type="number" step="any" value="20"></label>
  <br id="planet2" style="display:none;">
  <label id="planet3" style="display:none;">Ring gear teeth: <input id="r" type="number" step="any" value="40"></label>
  <br id="planet4" style="display:none;">
  <label id="planet5" style="display:none;">Number of planet gears: <input id="n_p" type="number" step="any" value="4"></label>
  <br id="planet6" style="display:none;">

  <label id="rack1" style="display:none;">Teeth size (module): <input id="m_rack" type="number" step="any" value="1"></label>
  <br id="rack2" style="display:none;">

  <br id="worm2" style="display:none;">

  <br id="worm4" style="display:none;">
  <label id="worm5" style="display:none;">Degrees for rotating:
    <select id="q">
      <option value="15">15</option>
      <option value="5">5</option>
    </select>
  </label>
  <br id="worm6" style="display:none;">

    //combined gears calculator (by @dabl2928 on youtube)
    //v1.0.0 - initial (2026 Jan 16)

    //v1.1.0 - added bevel gears, changed text sizes (2026 Apr 22)
    //v1.1.1 - added module recommender but only for bevel gears (2026 Apr 22)

    function round(n,d=2){p=Math.pow(10,d);return Math.round(n*p)/p;}
    function input(id){return document.getElementById(id);}
    function isNearlyInteger(x,e=1e-9){return Math.abs(Math.round(x)-x)<e;}

    function basic(){
      t=input('type').value;
      d=parseFloat(input('d_basic').value);
      m=parseFloat(input('m_basic').value);
      thickness=parseFloat(input('thickness').value);

      valid = (m!=0 && m>0
      &&
      d!=0 && d>0
      &&
      thickness!=0 && thickness>0
      &&
      isNearlyInteger(d/m)
      );

      if (valid) {
        n_teeth=d/m;
        odd=(Math.round(n_teeth)%2)===1;
        if(t==='external'){
          inner_d=d-2.4*m;
          outer_d=d+2*m;
          circle_piece=round(inner_d*Math.tan(Math.PI/n_teeth));
        } else {
          inner_d=d+2.4*m;
          outer_d=d+2.4*m+2*thickness;
          circle_piece=round(outer_d*Math.tan(Math.PI/n_teeth))
        }

        if (t==='internal') {tooth_height=round(0.6*2.2*m);} // 0.6 is the correction (makes it run smooth)
        else {tooth_height=round(2.2*m);}

        nt=Math.round(n_teeth);

        if(nt<=5){g=0.6;}
        else if(nt<=7){g=0.7;}
        else if(nt<=12){g=0.8;}
        else if(nt<=22){g=0.9;}
        else if(nt<=57){g=1;}
        else {g=1.1;}

        tooth_arc_length=round(m*g);
        deg=round(360/n_teeth);

        if(t==='internal') AIS0=round(inner_d/2+1);
        else AIS0=round(inner_d/2-1);

        AIS1=round((circle_piece-2)/2);
        AIS2=round((tooth_arc_length-2)/2);
        AIS3=round(tooth_height-2);
        //#####################################################
        out=`========GEAR-INFO========\n`;
        out+=`Type: ${t}\n`;
        out+=`Number of teeth: ${nt}\n`;
        out+=`Module (teeth size): ${m}\n\n`;
        
        if(odd) //ODDS
			    if (t==='internal') {out+=`Inner radius: ${round(inner_d/2)} studs  (move for: ${round(AIS0)})\nOuter diameter: ${round(outer_d)} studs\nThickness: ${round(thickness)} studs  (amount in scale: ${round(thickness-2)})\n`;}
		      else {out+=`Inner radius: ${round(inner_d/2)} studs  (amount in scale: ${AIS0})\n`;}
		    else //EVEN
			    if (t==='internal') {out+=`Inner diameter: ${round(inner_d)} studs  (move for: ${AIS0} on both sides)\nOuter diameter: ${round(outer_d)} studs\nThickness: ${round(thickness)} studs  (amount in scale: ${round(thickness-2)})\n`;}
		      else {out+=`Inner diameter: ${round(inner_d)} studs  (amount in scale: ${AIS0} for both sides)\n`;}

        out+=`Circle piece: ${circle_piece}  (amount in scale: ${AIS1})\n`;
        out+=`Tooth length: ${tooth_arc_length}  (amount in scale: ${AIS2})\n`;
        out+=`Tooth height: ${tooth_height}  (amount in scale: ${AIS3})\n`;

        out+=`\nDegrees for rotating and cloning: ${deg}\n`;

        out+='\n==========CHECK-DIMENSIONS==========';
        out+=`\nTooth part dimensions: ${round(2+2*AIS2)} x ${tooth_height}\n`;

        if(odd)
	        if (t===`internal`)
		        {out+=`Other part dimensions: ${round(2+2*AIS1)} x ${thickness}\n`}
	        else
		        {out+=`Other part dimensions: ${round(2+2*AIS1)} x ${inner_d/2}\n`}
        else
	        if (t==='internal')
            {out+=`Other part dimensions: ${round(2+2*AIS1)} x ${thickness}\n`}
	        else
		        {out+=`Other part dimensions: ${round(2+2*AIS1)} x ${inner_d}\n`}

        if(odd)out+='\nWARNING: gear has an odd number of teeth (add another large part for cloning and rotating)';
      } else {
        if (m==0 || m<0){out=`ERROR: Invalid module (teeth size: ${m})`
        } else if (thickness==0 || thickness<0){out="ERROR: Invalid thickness"
        } else if (d==0 || d<0) {out="ERROR: Invalid diameter"
        } else if (!isNearlyInteger(d/m)) {out=`ERROR: Number of teeth isn't a full number ${d/m}`}
      }

      input('output').textContent=out;
      input('output').style.fontSize='16px';
      input('output').style.fontWeight='normal';
    }

    function worm(){
      d=parseFloat(input("d_worm").value);
      m=parseFloat(input("m_worm").value);
      q=parseFloat(input("q").value);

      valid = (m!=0 && m>0
      &&
      d!=0 && d>0
      &&
      d-2.4*m>=0.05
      &&
      ((d-2.4*m)*Math.tan(Math.PI/(360/q)))>=0.05
      &&
      180/Math.PI*Math.atan(m/(d-2.4*m))<=30
      );

      if (valid) {
        n=360/q; //number of circle sides

        inner_d = round(d-2.4*m);
        AIS_1 = round(inner_d/2-1); //inner diameter
        outer_d = round(d+2*m);

        circle_piece = round(inner_d*Math.tan(Math.PI/n));
        AIS_0 = round(circle_piece/2-1); //circle piece
        
        pitch = round(m*Math.PI);
        gamma = round(180/Math.PI*Math.atan(m/inner_d));
        middle_part = round(0.5*m*Math.PI);

        tooth_height = round(2.2*m,2);
        AIS_2 = round(tooth_height-2,2); //tooth height

        tooth_top = round(outer_d*Math.tan(Math.PI/n));
        AIS_3 = round(tooth_top/2-1); //circle piece but for tooth

        tooth_width = round(1.1*m);
        AIS_4 = round(tooth_width/2-1); //1.1m tooth width thing

        s_x=round(2+AIS_2);
        s_y=round(2+2*AIS_4);
        s_z=round(2+2*AIS_3);

        t_x=round(2+2*AIS_0);
        t_y=round(2+2*AIS_1);
        t_z=round(pitch);

        spiral_block = s_x*s_y*s_z/8;
        stem_block = t_x*t_y*t_z/8;

        spiral = n*spiral_block;
        if (spiral_block<1){spiral = n;}

        stem = n/2*stem_block;
        if (stem_block<1){stem = n/2;}

        blocks = Math.ceil(spiral+stem);

        out="========WORM GEAR INFO:========\n"
        out+=`Module: ${m}\n\n`
        out+=`Circle piece: ${circle_piece}  (amount in scale: ${AIS_0} for both sides)\n`
        out+=`Inner diameter: ${inner_d}  (amount in scale: ${AIS_1} for both sides)\n\n`
        out+=`Helical angle: ${gamma}\n`
        out+=`Tooth height: ${tooth_height} (amount in scale: ${AIS_2})\n`
        out+=`Tooth top length: ${tooth_top} (amount in scale: ${AIS_3} for both sides)\n`
        out+=`Tooth width: ${tooth_width} (amount in scale: ${AIS_4} for both sides)\n`
        out+=`\nCloning table:\n`
        out+=`-180 degrees: ${round(pitch/2)} once\n`
        out+=`-90 degree: ${round(pitch/4)} once\n`
        out+=`-45 degree: ${round(pitch/8)} once\n`
        out+=`-15 degree: ${round(pitch/24)} three times\n`
        if (q==5) {out+=`-5 degree: ${round(pitch/72)} three times\n`}
        out+=`\nFull pitch: ${pitch}  (${blocks} blocks per pitch/loop)\n`
        out+=`\n==========CHECK-DIMENSIONS==========\n`
        out+=`Center part: ${t_x} x ${t_y}\n`
        out+=`Spiral part: ${s_x} x ${s_y} x ${s_z}\n`
      } else {
        if (m==0 || m<0) {out=`ERROR: Invalid module (teeth size: ${m})`
        } else if (d==0 || d<0) {out="ERROR: Invalid diameter"
        } else if (d-2.4*m<0.05) {out=`ERROR: Bigger diameter or smaller module (inner diameter becomes ${round(d-2.4*m)})`

        } else if (180/Math.PI*Math.atan(m/(d-2.4*m))>30) {out=`ERROR: Helix angle is too steep: ${round(180/Math.PI*Math.atan(m/(d-2.4*m)))} (increase diameter/decrease module)`
        } else {out=`ERROR: Unknown (comment which values you used and I will fix it)`}
      }

      input('output').textContent=out;

    function rack(){
      pi = Math.PI;
      m = parseFloat(input("m_rack").value);

      valid = (m != 0 && m>0);

      clone_distance=round(m*pi);
	    tooth_height = round(2.2*m);
	    tooth_arc_length = round(1.1*m);
	    slope_length = round(tooth_height/Math.cos(12*pi/180));

      AIS0 = round(tooth_height-2);
	    AIS1 = round(tooth_arc_length/2-1);
	    AIS2 = round(slope_length-tooth_height);

      p_x = round(2+2*AIS1);
	    p_y = round(2+AIS0);
	    a_x = round(p_x);
	    a_y = round(p_y+AIS2);

      out=''
      if (valid){
		    out+='========RACK-INFO========\n';
		    out+=`Module (teeth size): ${m}\n\n`;
		    out+=`Tooth height: ${tooth_height} (amount in scale: ${AIS0})\n`;
		    out+=`Tooth length: ${tooth_arc_length} (amount in scale: ${AIS1})\n`;
		    out+=`Angle: 12 (use mirror)\n`;
		    out+=`Slope length: ${slope_length} (amount in scale: ${AIS2})\n\n`;
		    out+=`Clone distance: ${clone_distance}\n`;
		    out+=`\n==========CHECK-DIMENSIONS==========\n`;
		    out+=`Perpendicular piece: ${p_x} x ${p_y}\n`;
		    out+=`Angled pieces: ${a_x} x ${a_y}`;
	    } else{
		    out+=`ERROR: not a valid tooth size (cant be negative or zero) (module: ${m})`
	    }

      input('output').textContent=out;

      input('output').style.fontWeight='normal';
    }

    function planetary(){

	    r = parseFloat(input("r").value);
	    n_p = parseFloat(input("n_p").value);

      valid = (s < r && Math.round(s / n_p) - s / n_p === 0 && Math.round(r / n_p) - r / n_p === 0);

      out=''
      if(valid) {out="INFO: valid planetary gear set\n\n"} else {out="WARNING: planetary gear set cannot mesh (calculating ratios anyway)\n\n"}

      R = (-r)/s

	    f_c=(1/R) //carrier fixed
	    out+="Carrier fixed:\n"
	    out+=` -Sun as input (outputs with ring): ${1/f_c} torque multiplication (reversed)\n`
	    out+=` -Ring as input (outputs with sun): ${f_c} torque multiplication (reversed)\n`

	    f_s=(R-1)/R //sun fixed
	    out+="Sun fixed:\n"
      out+=` -Carrier as input (outputs with ring): ${1/f_s} torque multiplication\n`                  
      out+=` -Ring as input (outputs with carrier): ${f_s} torque multiplication\n`

	    f_r=(-1)*(R-1) //ring gear fixed
	    out+="Ring fixed:\n"
      out+=` -Sun as input (outputs with carrier): ${f_r} torque multiplication\n`                  
    	out+=` -Carrier as input (outputs with sun): ${1/f_r} torque multiplication\n`

      input('output').textContent=out;
      input('output').style.fontSize='16px';
      input('output').style.fontWeight='normal';
    }

    function bevel(){
      r1=parseFloat(input("r1").value);
      r2=parseFloat(input("r2").value);
      m=parseFloat(input("m_bevel").value);
      k=parseFloat(input("k").value)/100; //100% would be a full cone
      a=parseFloat(input("a").value);

      ratio=r1/r2;

      pi=Math.PI;

      dp1=r1*2 //planning cone diameter
      dp2=r2*2
      hp1=(r2-Math.cos((180-a)*pi/180)*r1)/(Math.cos((90-a)*pi/180)) //planning cone height (the entire bevel calculator depends on this)
      hp2=(r1-Math.cos((180-a)*pi/180)*r2)/(Math.cos((90-a)*pi/180))
      hyp=Math.hypot(r1,hp1) //planning cone hypotenuse, same for both
      angle1=Math.atan(hp1/r1)*180/pi //planning cone angle (at the thin edge, not the apex)
      angle2=Math.atan(hp2/r2)*180/pi

      dangle=Math.atan((1.2*m)/(Math.hypot(hp1,r1)))*180/pi 

      n1=Math.round(dp1/m) //number of teeth
      n2=Math.round(dp2/m)
      deg1=round(360/n1,2) //degrees for rotating
      deg2=round(360/n2,2)
      odd1=n1%2; //True if odd
      odd2=n2%2;

      hb1=round(m*n2/8); //base height, equal to how much you have to move back hinges
      hb2=round(m*n1/8);

      da1=dp1-2*Math.sin((angle1)*pi/180)*(1.2*m); //widest physical part (where teeth start)
      da2=dp2-2*Math.sin((angle2)*pi/180)*(1.2*m);
      dtop1=da1*(1-k); //top diameter (after only trimming)
      dtop2=da2*(1-k);
      daa1=round(da1*(1-k)/2,2)*2; //top diameter (after trimming)
      daa2=round(da2*(1-k)/2,2)*2;
      la1=round(hyp*k/Math.cos(dangle*pi/180),2); //part length (root hypotenuse)
      la2=round(hyp*k/Math.cos(dangle*pi/180),2);
      ta1=round(1.5*m,2); //could be improved, kind of guessed now
      ta2=round(1.5*m,2);
      ca1=round(daa1*Math.tan(pi/n1)/2,2)*2; //circle piece angled piece
      ca2=round(daa2*Math.tan(pi/n2)/2,2)*2;

      ht1=round(hp1*k-Math.sin((a-angle1)*pi/180)*1.2*m*(1-k)+hb1,2); //height of the upper cylinder
      ht2=round(hp2*k-Math.sin((a-angle2)*pi/180)*1.2*m*(1-k)+hb2,2);
      ct1=round(daa1*Math.tan(pi/n1)/2,2)*2; //circle piece of the upper cylinder
      ct2=round(daa2*Math.tan(pi/n2)/2,2)*2;

      di1=dp1/Math.cos(deg1*pi/180); //imaginary diameter
      di2=dp1/Math.cos(deg2*pi/180);
      ni1=round(di1/m); //imaginary number of teeth
      ni2=round(di2/m);

      if (ni1<=5){g1=0.6} //these are the top of the tooth values at the end of the involute curve (taken from pressure angle 12)
      else if (ni1<=7){g1=0.7}
      else if (ni1<=12){g1=0.8}
      else if (ni1<=22){g1=0.9}
      else if (ni1<=57){g1=1}
      else {g1=1.1};
        
      if (ni2<=5){g2=0.6}
      else if (ni2<=7){g2=0.7}
      else if (ni2<=12){g2=0.8}
      else if (ni2<=22){g2=0.9}
      else if (ni2<=57){g2=1}
      else {g2=1.1};
        
      tarc1=round(m*g1*(1-k)/2,2)*2; //tooth arc length
      tarc2=round(m*g2*(1-k)/2,2)*2;
      corr1=Math.hypot(daa1/2,ct1/2)-dtop1/2;
      corr2=Math.hypot(daa2/2,ct2/2)-dtop2/2; //correction value (takes into account the longer diagonal on the n-gon from other gear)
      th=2.2*m;
      th1=round(2.2*m-corr1,2); //corrected tooth height
      th2=round(2.2*m-corr2,2);
        
      v1=hyp/Math.cos(dangle*pi/180)*k*Math.sin((angle1+dangle)*pi/180);
      v2=hyp/Math.cos(dangle*pi/180)*k*Math.sin((angle2+dangle)*pi/180);
      h1=(da1-dtop1)/2;
      h2=(da2-dtop2)/2;
      tilt1=Math.atan(v1/h1)*180/pi;
      tilt2=Math.atan(v2/h2)*180/pi;
      align=Math.atan(th*k/la1)*180/pi; //how much to angle teeth so that it meets at the same point
        
      u1=[daa1,ht1,ct1]; //dimensions table for upper part
      u2=[daa2,ht2,ct2]; //d, height, circle piece
        
      a1=[la1,ta1,ca1]; //dimensions table for angled part
      a2=[la2,ta2,ca2]; //hyp, thickness, circle piece
        
      t1=[la1,th1,tarc1]; //dimensions table for tooth part
      t2=[la2,th2,tarc2]; //hyp, height, arc length

      valid=(r1>0.05 &&
      r2>0.05 &&
      a>0 &&
      a<180 &&
      k>0 &&
      k<=0.35 &&
      m>0 &&
      hp1>0.05 &&
      hp2>0.05 &&
      dp1%m<0.1 && //allows a very small tolerance for teeth (shouldnt cause problems)
      dp2%m<0.1 &&
      n1>=6 &&
      n2>=6 &&
      odd1==false &&
      //no support for odd number of teeth
      //-
      //(just double the number of teeth and problem solved mi hermano, in case youre disabling
      //this limit then just make sure to not build the entire slice but only half of it and then
      //rotate that around the axis, you will need to add another part so that the center of
      //rotating is at the axis where it should be)
      odd2==false &&
      u1[0]>=0.05 &&
      u1[1]>=0.05 &&
      u1[2]>=0.05 &&
      u2[0]>=0.05 &&
      u2[1]>=0.05 &&
      u2[2]>=0.05 &&
      a1[0]>=0.05 &&
      a1[1]>=0.05 && //cant make parts smaller than 0.05
      a1[2]>=0.05 &&
      a2[0]>=0.05 &&
      a2[1]>=0.05 &&
      a2[2]>=0.05 &&
      t1[0]>=0.05 &&
      t1[1]>=0.05 &&
      t1[2]>=0.05 &&
      t2[0]>=0.05 &&
      t2[1]>=0.05 &&
      t2[2]>=0.05
      );

      if (valid) {        
        upart1=Math.ceil(u1[0]*u1[1]*u1[2]/8);
        if (upart1<1) {upart1=1};
        upart2=Math.ceil(u2[0]*u2[1]*u2[2]/8);
        if (upart2<1) {upart2=1};
        
        apart1=Math.ceil(a1[0]*a1[1]*a1[2]/8);
        if (apart1<1) {apart1=1};
        apart2=Math.ceil(a2[0]*a2[1]*a2[2]/8);
        if (apart2<1) {apart2=1};
        
        tpart1=Math.ceil(t1[0]*t1[1]*t1[2]/8);
        if (tpart1<1) {tpart1=1};
        tpart2=Math.ceil(t2[0]*t2[1]*t2[2]/8);
        if (tpart2<1) {tpart2=1};
        
        slice1=upart1+apart1*2+tpart1*2; //how many blocks one "slice" has (before cloning and rotating)
        slice2=upart2+apart2*2+tpart2*2;
        ab1=n1*slice1/2; //number of blocks
        ab2=n2*slice2/2;
        
        out=`=============================BEVEL-PAIR-INFO==============================\n`;
        out+=`Module: ${round(m)}\n`;
        out+=`First gear: ${round(ab1)} blocks (${n1} teeth)\n`;
        out+=`Second gear: ${round(ab2)} blocks (${n2} teeth)\n`;
        out+=`Height percentage: ${round(k)}\n`;
        out+=`Gear ratio: ${round(ratio)} or ${round(1/ratio)}\n`;
        out+=`Teeth: ${n1} to ${n2}\n\n\n`;
        
        out+=`================================FIRST-GEAR================================\n`;
        out+=` 1. Number of teeth: ${round(n1)}\n`;
        out+=` 1. Planning diameter: ${round(dp1)}\n\n`;
        
        out+=` 1. Move hinge/wheel back for ${round(hb1)}\n`;
        out+=` 1. Top diameter: ${round(u1[0])} (amount in scale: ${round(u1[0]/2-1)}, both sides)\n`;
        out+=` 1. Top thickness: ${round(u1[1])} (amount in scale: ${round(u1[1]-2)})\n`;
        out+=` 1. Top circle piece: ${round(u1[2])} (amount in scale: ${round(u1[2]/2-1)}, both sides)\n\n`;
        
        out+=` 1. Mirror 2x and angle ${round(tilt1)} degrees on corner\n`;
        out+=` 1. Slope length: ${round(a1[0])} (amount in scale: ${round(a1[0]-u1[0])})\n`; //or 4x mirror
        out+=` 1. Slope depth: ${round(a1[1])} (amount in scale: ${round(a1[1]-u1[1])})\n\n`;
        
        out+=` 1. Mirror slope 2x and angle ${round(align)} degrees on outer corner\n`;
        out+=` 1. Tooth height: ${round(t1[1])} (amount in scale: ${round(t1[1]-a1[1])})\n`;
        out+=` 1. Tooth width: ${round(t1[2])} (amount in scale: ${round((t1[2]-a1[2])/2)}, both sides)\n\n`;
        
        out+=` 1. Degrees for rotating and cloning: ${round(deg1)}\n\n`;
        
        out+=`===FIRST-GEAR-DIMENSIONS===\n`;
        out+=`1. Top part: ${round(u1[0])} x ${round(u1[1])} x ${round(u1[2])}\n`;
        out+=`1. Angled part: ${round(a1[0])} x ${round(a1[1])} x ${round(a1[2])}\n`;
        out+=`1. Tooth part: ${round(t1[0])} x ${round(t1[1])} x ${round(t1[2])}\n\n\n`;


        out+=`================================SECOND-GEAR================================\n`;
        out+=` 2. Number of teeth: ${round(n2)}\n`;
        out+=` 2. Planning diameter: ${round(dp2)}\n\n`;
        
        out+=` 2. Move hinge/wheel back for ${round(hb2)}\n`;
        out+=` 2. Top diameter: ${round(u2[0])} (amount in scale: ${round(u2[0]/2-1)}, both sides)\n`;
        out+=` 2. Top thickness: ${round(u2[1])} (amount in scale: ${round(u2[1]-2)})\n`;
        out+=` 2. Top circle piece: ${round(u2[2])} (amount in scale: ${round(u2[2]/2-1)}, both sides)\n\n`;
        
        out+=` 2. Mirror 2x and angle ${round(tilt2)} degrees on corner\n`;
        out+=` 2. Slope length: ${round(a2[0])} (amount in scale: ${round(a2[0]-u2[0])})\n`; //or 4x mirror
        out+=` 2. Slope depth: ${round(a2[1])} (amount in scale: ${round(a2[1]-u2[1])})\n\n`;
        
        out+=` 2. Mirror slope 2x and angle ${round(align)} degrees on outer corner\n`;
        out+=` 2. Tooth height: ${round(t2[1])} (amount in scale: ${round(t2[1]-a2[1])})\n`;
        out+=` 2. Tooth width: ${round(t2[2])} (amount in scale: ${round((t2[2]-a2[2])/2)}, both sides)\n\n`;
        
        out+=` 2. Degrees for rotating and cloning: ${round(deg2)}\n\n`;
        
        out+=`===SECOND-GEAR-DIMENSIONS===\n`;
        out+=`2. Top part: ${round(u2[0])} x ${round(u2[1])} x ${round(u2[2])}\n`;
        out+=`2. Angled part: ${round(a2[0])} x ${round(a2[1])} x ${round(a2[2])}\n`;
        out+=`2. Tooth part: ${round(t2[0])} x ${round(t2[1])} x ${round(t2[2])}\n\n\n`;
      } else {
        if (a<=0 || a>=180) {out=`ERROR: Incorrect shaft angle (${a})`;
        } else if (dp1%m>=0.1 || dp2%m>=0.1 || m<=0 || n1<6 || n2<6) {
          out=`ERROR: Incorrect module (not a full number or less than 6 teeth: ${round(dp1/m)} and ${round(dp2/m)} teeth)\n\n`;
          out+=`List of modules that would work (choose any):\n`;
          for (n=6;n<500;n+=2) {
            mn=Math.min(dp1,dp2)/n; //checks situations all the way to 500 teeth to find suitable modules

            tn1=Math.round(dp1/mn); //number of teeth
            tn2=Math.round(dp2/mn);

            todd1=tn1%2; //true if odd
            todd2=tn2%2;

            thick=round(mn*1.1*(1-k)/2)*2;
            thick>=0.06; //tooth thickness has to be atleast 0.06

            nicenumber=(round(mn,4)==mn); //nice number means it has 4 decimal places max

            if (!todd1 && !todd2 && dp1%mn<0.1 && dp2%mn<0.1 && thick && nicenumber) { //only if not odd, less than 0.1 when diameter/module, tooth thick enough, 2 decimals
              out+=` -module: ${mn}\n`;
            }
          }
        } else if (hp1<0 || hp2<0) {out=`ERROR: Not possible to make, cone's height goes negative, reduce shaft angle or change radii\n(calculated: ${round(hp1)}, ${round(hp2)})`;
        } else if (r1<0.05) {out=`ERROR: Invalid radius1 (smaller than 0.05: ${r1})`;
        } else if (r2<0.05) {out=`ERROR: Invalid radius2 (smaller than 0.05: ${r2})`;
        } else if (k<=0 || k>0.35) {out=`ERROR: Invalid height percentage`
        } else if (odd1 || odd2) {
          out=`ERROR: Odd number of teeth on first gear\n`;
          out+=`(not supported, because i think its almost useless since you can\n`;
          out+=`just halve the module and get double the teeth with the same ratio)\n\n`;
          out+=`Module ${m/2} will work (teeth will double)`;
        } else if (u1[0]<0.05 || u1[1]<0.05 || u1[2]<0.05 || u2[0]<0.05 || u2[1]<0.05 || u2[2]<0.05 || a1[0]<0.05 || a1[1]<0.05 || a1[2]<0.05 || a2[0]<0.05 || a2[1]<0.05 || a2[2]<0.05 || t1[0]<0.05 || t1[1]<0.05 || t1[2]<0.05 || t2[0]<0.05 || t2[1]<0.05 || t2[2]<0.05) {
          out=`ERROR: one of the parts' dimensions' get smaller than 0.05 (impossible to make)\n`;
          out+=` increasing the module or height percentage or diameter will fix this`
        } else {out=`ERROR: Unknown (comment which values you used and I will fix it)`;};
      };

      input('output').textContent=out;
      input('output').style.fontSize='16px';
      input('output').style.fontWeight='normal';
    }
